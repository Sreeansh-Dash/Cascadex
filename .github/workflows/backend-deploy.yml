name: Deploy Backend
on:
  push:
    branches: [main]
    paths: ['packages/api/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --service cascadex-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
