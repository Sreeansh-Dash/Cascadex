name: Graph Query Tests
on:
  push:
    branches: [main, develop]
    paths: ['packages/graph/**']
  pull_request:
    paths: ['packages/graph/**']

jobs:
  test-queries:
    name: Cypher Query Tests
    runs-on: ubuntu-latest

    # Skip if Neo4j secrets aren't configured
    if: ${{ vars.HAS_NEO4J_SECRETS != 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-graph-${{ hashFiles('packages/graph/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd packages/graph
          pip install -r requirements.txt

      - name: Test core Cypher queries against test instance
        run: |
          cd packages/graph
          python test_queries.py
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        continue-on-error: true
