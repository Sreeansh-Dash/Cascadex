name: Graph Query Tests
on:
  push:
    branches: [main, develop]
    paths: ['packages/graph/**']
  pull_request:
    paths: ['packages/graph/**']

jobs:
  test-queries:
    name: Cypher Query Tests
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/localdevpassword
        ports:
          - 7687:7687

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-graph-${{ hashFiles('packages/graph/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd packages/graph
          pip install -r requirements.txt

      - name: Seed Test Database
        run: |
          cd packages/graph
          python seed_demo_data.py
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: localdevpassword

      - name: Test core Cypher queries against test instance
        run: |
          cd packages/graph
          python test_queries.py
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: localdevpassword
        continue-on-error: true
