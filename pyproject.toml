# ===========================
# Cascadex — Root Project Configuration
# ===========================
# Shared tooling config for all Python packages in this monorepo.

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
# E501 ignored: line length handled by formatter, not linter
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["packages"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/api/tests"]
