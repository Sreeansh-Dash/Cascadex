# Render.com Blueprint — Cascadex API
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cascadex-api
    runtime: python
    region: oregon
    plan: free
    rootDir: packages/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.13.0"
