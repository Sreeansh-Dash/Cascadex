version: "3.8"

services:
  # Local Neo4j instance for development (optional — use AuraDB for production)
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/localdevpassword
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # FastAPI backend
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - neo4j
    volumes:
      - ./packages/api:/app

volumes:
  neo4j_data:
  neo4j_logs:
